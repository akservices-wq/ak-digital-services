<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Digital Services — Shop Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#f6f4ef; --surface:#ffffff; --sidebar:#0f2438; --sidebar-hover:#1c3d59;
  --sidebar-text:#b9c8d6; --accent:#d98e2b; --accent-dark:#b8721c; --accent-light:#fbe8cc;
  --text:#1c2530; --text-muted:#6b7480; --border:#e5e0d3;
  --success:#1e8a5f; --success-light:#e2f4ec; --danger:#c1443b; --danger-light:#fbe7e5;
  --warning:#d98e2b; --warning-light:#fbe8cc; --radius:10px;
  --shadow:0 1px 2px rgba(15,36,56,0.06), 0 4px 16px rgba(15,36,56,0.04);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; font-size:14px;}
.mono{font-family:'JetBrains Mono',monospace;}
.app{display:flex; height:100vh; width:100vw;}
.sidebar{width:236px; min-width:236px; background:var(--sidebar); color:var(--sidebar-text); display:flex; flex-direction:column; height:100%;}
.brand{display:flex; align-items:center; gap:10px; padding:20px 18px 16px 18px; border-bottom:1px solid rgba(255,255,255,0.08);}
.brand-badge{width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-dark)); display:flex; align-items:center; justify-content:center; font-family:'Sora',sans-serif; font-weight:800; color:#1c1305; font-size:15px; letter-spacing:-0.5px; flex-shrink:0; box-shadow:0 0 0 3px rgba(217,142,43,0.18);}
.brand-text .name{font-family:'Sora',sans-serif; font-weight:700; font-size:14.5px; color:#fff; line-height:1.25;}
.brand-text .sub{font-size:10.5px; color:var(--sidebar-text); letter-spacing:0.06em; text-transform:uppercase;}
.nav{flex:1; overflow-y:auto; padding:10px 10px;}
.nav-item{display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:8px; cursor:pointer; color:var(--sidebar-text); font-size:13.5px; font-weight:500; margin-bottom:2px; transition:background .12s, color .12s; user-select:none;}
.nav-item .ic{width:18px; text-align:center; font-size:15px;}
.nav-item:hover{background:var(--sidebar-hover); color:#fff;}
.nav-item.active{background:var(--accent); color:#1c1305; font-weight:600;}
.nav-section-label{font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:#5c7286; padding:14px 12px 6px 12px; font-weight:600;}
.sidebar-footer{padding:12px; border-top:1px solid rgba(255,255,255,0.08);}
.logout-btn{width:100%; padding:9px; border-radius:8px; background:rgba(255,255,255,0.06); color:var(--sidebar-text); border:1px solid rgba(255,255,255,0.1); cursor:pointer; font-size:13px; font-weight:500; font-family:inherit;}
.logout-btn:hover{background:rgba(255,255,255,0.12); color:#fff;}
.main{flex:1; display:flex; flex-direction:column; height:100%; min-width:0;}
.topbar{height:60px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; flex-shrink:0;}
.topbar-title{font-family:'Sora',sans-serif; font-weight:700; font-size:19px; color:var(--text);}
.topbar-right{display:flex; align-items:center; gap:16px;}
.topbar-date{font-size:12.5px; color:var(--text-muted); font-family:'JetBrains Mono',monospace;}
.content{flex:1; overflow-y:auto; padding:24px;}
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:20px;}
.stat-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow); position:relative; overflow:hidden;}
.stat-card .label{font-size:11.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; font-weight:600;}
.stat-card .value{font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700; margin-top:6px; color:var(--text);}
.stat-card .delta{font-size:11.5px; margin-top:4px; color:var(--text-muted);}
.stat-card.accent{border-left:4px solid var(--accent);}
.stat-card.success{border-left:4px solid var(--success);}
.stat-card.danger{border-left:4px solid var(--danger);}
.stat-card.neutral{border-left:4px solid #6b7480;}
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow); margin-bottom:18px;}
.card-title{font-family:'Sora',sans-serif; font-weight:700; font-size:15px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between;}
.two-col{display:grid; grid-template-columns:1.3fr 1fr; gap:16px;}
@media(max-width:1100px){.two-col{grid-template-columns:1fr;}}
.btn{font-family:'Inter',sans-serif; font-weight:600; font-size:13px; padding:8px 15px; border-radius:8px; border:1px solid transparent; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:.12s;}
.btn-primary{background:var(--accent); color:#1c1305;}
.btn-primary:hover{background:var(--accent-dark); color:#fff;}
.btn-outline{background:transparent; border:1px solid var(--border); color:var(--text);}
.btn-outline:hover{background:var(--bg);}
.btn-danger{background:var(--danger-light); color:var(--danger);}
.btn-danger:hover{background:var(--danger); color:#fff;}
.btn-success{background:var(--success-light); color:var(--success);}
.btn-success:hover{background:var(--success); color:#fff;}
.btn-sm{padding:5px 10px; font-size:12px; border-radius:6px;}
.btn:disabled{opacity:.5; cursor:not-allowed;}
.toolbar{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
.toolbar .spacer{flex:1;}
input,select,textarea{font-family:'Inter',sans-serif; font-size:13px; padding:8px 11px; border-radius:8px; border:1px solid var(--border); background:#fff; color:var(--text); outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
.search-box{min-width:220px;}
table{width:100%; border-collapse:collapse; font-size:13px;}
thead th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted); padding:9px 12px; border-bottom:2px solid var(--border); font-weight:700; white-space:nowrap;}
tbody td{padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle;}
tbody tr:hover{background:#faf8f3;}
.table-wrap{overflow-x:auto;}
.tag{display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600;}
.tag.success{background:var(--success-light); color:var(--success);}
.tag.danger{background:var(--danger-light); color:var(--danger);}
.tag.warning{background:var(--warning-light); color:var(--accent-dark);}
.tag.neutral{background:#eceae3; color:var(--text-muted);}
.row-actions{display:flex; gap:6px;}
.icon-btn{width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px;}
.icon-btn:hover{background:var(--bg);}
.empty-state{text-align:center; padding:50px 20px; color:var(--text-muted);}
.empty-state .em-ic{font-size:32px; margin-bottom:10px;}
.total-row td{font-weight:700; border-top:2px solid var(--border); background:#faf8f3;}
.modal-overlay{position:fixed; inset:0; background:rgba(15,36,56,0.45); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff; border-radius:14px; width:520px; max-width:100%; max-height:88vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.25);}
.modal-head{padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;}
.modal-head h3{font-family:'Sora',sans-serif; font-size:16px;}
.modal-close{cursor:pointer; font-size:18px; color:var(--text-muted); border:none; background:none;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.form-grid.single{grid-template-columns:1fr;}
.field{display:flex; flex-direction:column; gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12px; font-weight:600; color:var(--text-muted);}
.field input,.field select,.field textarea{width:100%;}
.lock-screen{position:fixed; inset:0; background:var(--sidebar); display:flex; align-items:center; justify-content:center; z-index:200;}
.lock-card{background:#fff; border-radius:16px; padding:36px 34px; width:340px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.lock-card .brand-badge{margin:0 auto 14px auto;}
.lock-card h2{font-family:'Sora',sans-serif; margin-bottom:4px;}
.lock-card p{color:var(--text-muted); font-size:12.5px; margin-bottom:18px;}
.lock-card input{width:100%; text-align:center; font-size:20px; letter-spacing:6px; padding:12px; margin-bottom:12px; font-family:'JetBrains Mono',monospace;}
.lock-error{color:var(--danger); font-size:12px; margin-bottom:10px; min-height:14px;}
.toast{position:fixed; bottom:22px; right:22px; background:var(--text); color:#fff; padding:12px 18px; border-radius:9px; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.25); z-index:300; opacity:0; transform:translateY(10px); transition:.2s; display:flex; align-items:center; gap:8px;}
.toast.show{opacity:1; transform:translateY(0);}
.toast.success{background:var(--success);}
.toast.danger{background:var(--danger);}
.section-title{font-family:'Sora',sans-serif; font-weight:800; font-size:22px; margin-bottom:2px;}
.section-desc{color:var(--text-muted); font-size:13px; margin-bottom:18px;}
.badge-count{background:var(--accent); color:#1c1305; font-size:10.5px; padding:1px 7px; border-radius:20px; font-weight:700; margin-left:auto;}
.low-stock-item{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px;}
.low-stock-item:last-child{border-bottom:none;}
.progress-track{width:100%; height:8px; background:#eceae3; border-radius:6px; overflow:hidden; margin-top:6px;}
.progress-fill{height:100%; background:var(--accent); border-radius:6px;}
::-webkit-scrollbar{width:9px; height:9px;}
::-webkit-scrollbar-thumb{background:#d8d3c4; border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}
.hint{font-size:11.5px; color:var(--text-muted); margin-top:8px;}
.receipt-no{font-family:'JetBrains Mono',monospace; color:var(--text-muted); font-size:12px;}
.kv-list div{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px dashed var(--border); font-size:13px;}
.kv-list div:last-child{border-bottom:none;}
.invoice-preview{background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:24px; max-width:600px; margin:0 auto; box-shadow:var(--shadow);}
.invoice-header{text-align:center; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid var(--accent);}
.invoice-header h2{font-family:'Sora',sans-serif; font-size:22px; color:var(--text); margin-bottom:4px;}
.invoice-header p{color:var(--text-muted); font-size:12px; margin:2px 0;}
.invoice-meta{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; font-size:12.5px;}
.invoice-meta .label{color:var(--text-muted); font-size:11px;}
.invoice-meta .value{font-weight:600;}
.invoice-items{width:100%; margin-bottom:16px;}
.invoice-items th{background:var(--bg); padding:8px 10px; text-align:left; font-size:11px; text-transform:uppercase; color:var(--text-muted);}
.invoice-items td{padding:8px 10px; border-bottom:1px solid var(--border); font-size:13px;}
.invoice-items .num{text-align:right; font-family:'JetBrains Mono',monospace;}
.invoice-total{text-align:right; padding:12px 0; border-top:2px solid var(--accent);}
.invoice-total .grand{font-family:'Sora',sans-serif; font-size:20px; font-weight:700; color:var(--text);}
.invoice-footer{text-align:center; margin-top:20px; padding-top:16px; border-top:1px dashed var(--border); color:var(--text-muted); font-size:11px;}
.invoice-actions{display:flex; gap:10px; justify-content:center; margin-top:20px; flex-wrap:wrap;}
.sync-badge{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; margin-left:8px;}
.sync-badge.online{background:var(--success-light); color:var(--success);}
.sync-badge.offline{background:var(--danger-light); color:var(--danger);}
.sync-badge.syncing{background:var(--warning-light); color:var(--accent-dark);}
.firebase-config{background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px;}
.firebase-config h4{font-family:'Sora',sans-serif; font-size:14px; margin-bottom:10px;}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module">
/* =========================================================
   AK DIGITAL SERVICES — SHOP MANAGER
   Cloud-enabled with Firebase Firestore, Offline Support,
   Billing, PDF Generation & WhatsApp Integration
   ========================================================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, onSnapshot, enableIndexedDbPersistence, writeBatch, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ---------------- FIREBASE CONFIG ---------------- */
const DEFAULT_FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let firebaseApp = null;
let db = null;
let auth = null;
let firebaseEnabled = false;
let firebaseListeners = {};
let isOnline = navigator.onLine;
let syncInProgress = false;

/* ---------------- DB LAYER (IndexedDB + Firestore) ---------------- */
const DB_NAME = "akDigitalServicesDB";
const DB_VERSION = 2;
const STORES = ["customers","transactions","aeps","irctc","pan","certificates",
                 "printing","photocopy","inventory","expenses","employees","settings","invoices","pendingSync"];
let idb;

function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e)=>{
      const _db = e.target.result;
      STORES.forEach(store=>{
        if(!_db.objectStoreNames.contains(store)){
          _db.createObjectStore(store, {keyPath:"id"});
        }
      });
    };
    req.onsuccess = (e)=>{ idb = e.target.result; resolve(idb); };
    req.onerror = (e)=> reject(e);
  });
}
function tx(store, mode){ return idb.transaction(store, mode).objectStore(store); }
function dbGetAll(store){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readonly").getAll();
    r.onsuccess=()=>resolve(r.result); r.onerror=(e)=>reject(e);
  });
}
function dbGet(store,id){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readonly").get(id);
    r.onsuccess=()=>resolve(r.result); r.onerror=(e)=>reject(e);
  });
}
function dbAdd(store,obj){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readwrite").put(obj);
    r.onsuccess=()=>resolve(r.result); r.onerror=(e)=>reject(e);
  });
}
function dbPut(store,obj){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readwrite").put(obj);
    r.onsuccess=()=>resolve(r.result); r.onerror=(e)=>reject(e);
  });
}
function dbDelete(store,id){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readwrite").delete(id);
    r.onsuccess=()=>resolve(); r.onerror=(e)=>reject(e);
  });
}
function dbClear(store){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readwrite").clear();
    r.onsuccess=()=>resolve(); r.onerror=(e)=>reject(e);
  });
}

/* ---------------- FIRESTORE SYNC ENGINE ---------------- */
async function initFirebase(config){
  try{
    if(config.apiKey === "YOUR_API_KEY"){
      showToast("Please configure Firebase in Settings first", "danger");
      return false;
    }
    firebaseApp = initializeApp(config);
    db = getFirestore(firebaseApp);
    auth = getAuth(firebaseApp);
    try{ await enableIndexedDbPersistence(db); }catch(err){ console.log("Persistence:", err.message); }
    firebaseEnabled = true;
    updateSyncBadge("syncing", "Connecting...");
    onAuthStateChanged(auth, (user)=>{
      if(user){
        showToast("Connected to cloud", "success");
        startRealtimeListeners();
        processPendingSync();
      } else {
        updateSyncBadge("offline", "Not Signed In");
      }
    });
    return true;
  }catch(e){
    console.error("Firebase init failed:", e);
    firebaseEnabled = false;
    updateSyncBadge("offline", "Cloud Error");
    return false;
  }
}

function updateSyncBadge(status, text){
  const badge = document.getElementById('syncStatusBadge');
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if(!badge) return;
  badge.className = `sync-badge ${status}`;
  if(dot) dot.style.color = status==='online' ? 'var(--success)' : status==='syncing' ? 'var(--warning)' : 'var(--danger)';
  if(txt) txt.textContent = text;
}

function startRealtimeListeners(){
  if(!db || !auth.currentUser) return;
  const userId = auth.currentUser.uid;
  STORES.forEach(storeName=>{
    if(storeName === 'pendingSync' || storeName === 'settings') return;
    if(firebaseListeners[storeName]) firebaseListeners[storeName]();
    const colRef = collection(db, `users/${userId}/${storeName}`);
    firebaseListeners[storeName] = onSnapshot(colRef, (snapshot)=>{
      snapshot.docChanges().forEach(change=>{
        const data = change.doc.data();
        data.id = change.doc.id;
        if(change.type === 'added' || change.type === 'modified'){
          dbGet(storeName, data.id).then(local=>{
            const localTime = local?._localUpdated || 0;
            const remoteTime = data._updatedAt || 0;
            if(!local || remoteTime >= localTime){
              dbPut(storeName, data).then(()=>{
                cache[storeName] = null;
                if(currentPage === storeName || (storeName==='invoices' && currentPage==='billing')){
                  renderPage(currentPage);
                }
                if(currentPage === 'dashboard') renderDashboard();
              });
            }
          });
        } else if(change.type === 'removed'){
          dbDelete(storeName, data.id).then(()=>{
            cache[storeName] = null;
            if(currentPage === storeName) renderPage(currentPage);
          });
        }
      });
      updateSyncBadge("online", "Synced");
    }, (err)=>{
      console.error(`Listener error for ${storeName}:`, err);
      updateSyncBadge("offline", "Sync Error");
    });
  });
}

async function syncToCloud(storeName, data, operation){
  if(!firebaseEnabled || !db || !auth.currentUser){
    const pending = {
      id: 'pending_' + Date.now() + '_' + Math.random().toString(36).substr(2,9),
      store: storeName, data: data, operation: operation, timestamp: Date.now()
    };
    await dbAdd('pendingSync', pending);
    updateSyncBadge("offline", "Pending Sync");
    return false;
  }
  try{
    const userId = auth.currentUser.uid;
    const docRef = doc(db, `users/${userId}/${storeName}`, String(data.id));
    if(operation === 'delete'){
      await deleteDoc(docRef);
    } else {
      const syncData = {...data, _updatedAt: Date.now(), _localUpdated: Date.now()};
      await setDoc(docRef, syncData);
    }
    updateSyncBadge("online", "Synced");
    return true;
  }catch(e){
    console.error("Sync failed:", e);
    const pending = {
      id: 'pending_' + Date.now() + '_' + Math.random().toString(36).substr(2,9),
      store: storeName, data: data, operation: operation, timestamp: Date.now()
    };
    await dbAdd('pendingSync', pending);
    updateSyncBadge("offline", "Sync Failed");
    return false;
  }
}

async function processPendingSync(){
  if(!db || !auth.currentUser || syncInProgress) return;
  syncInProgress = true;
  updateSyncBadge("syncing", "Syncing...");
  try{
    const pending = await dbGetAll('pendingSync');
    const userId = auth.currentUser.uid;
    for(const item of pending.sort((a,b)=>a.timestamp - b.timestamp)){
      try{
        const docRef = doc(db, `users/${userId}/${item.store}`, String(item.data.id));
        if(item.operation === 'delete'){ await deleteDoc(docRef); }
        else {
          const syncData = {...item.data, _updatedAt: Date.now(), _localUpdated: Date.now()};
          await setDoc(docRef, syncData);
        }
        await dbDelete('pendingSync', item.id);
      }catch(e){ console.error("Failed to sync pending item:", e); }
    }
    updateSyncBadge("online", "Synced");
  }catch(e){
    console.error("Pending sync processing failed:", e);
    updateSyncBadge("offline", "Sync Error");
  } finally { syncInProgress = false; }
}

window.addEventListener('online', ()=>{
  isOnline = true;
  if(firebaseEnabled && auth?.currentUser){ updateSyncBadge("syncing", "Reconnecting..."); processPendingSync(); }

/* ---------------- HELPERS ---------------- */
function generateId(){ return Date.now().toString(36) + Math.random().toString(36).substr(2,9); }
function today(){ return new Date().toISOString().slice(0,10); }
function now(){ return new Date().toISOString(); }
function fmtMoney(n){ return SETTINGS.currency + Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d) return "—"; const dt = new Date(d); if(isNaN(dt)) return d; return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = "toast show" + (type? " "+type : "");
  setTimeout(()=> t.classList.remove('show'), 2400);
}
function statusTagClass(status){
  const s = (status||"").toLowerCase();
  if(["completed","success","confirmed","issued","dispatched","active","paid"].includes(s)) return "success";
  if(["pending","processing","waiting","submitted","unpaid"].includes(s)) return "warning";
  if(["failed","rejected","cancelled","inactive"].includes(s)) return "danger";
  return "neutral";
}
async function refreshCache(store){ cache[store] = await dbGetAll(store); return cache[store]; }
async function ensureCache(store){ if(!cache[store]) await refreshCache(store); return cache[store]; }

/* ---------------- ENHANCED DB OPERATIONS WITH SYNC ---------------- */
async function addRecord(store, obj){
  if(!obj.id) obj.id = generateId();
  obj._createdAt = now(); obj._updatedAt = Date.now();
  await dbAdd(store, obj);
  await syncToCloud(store, obj, 'add');
  cache[store] = null;
  return obj;
}
async function updateRecord(store, obj){
  obj._updatedAt = Date.now();
  await dbPut(store, obj);
  await syncToCloud(store, obj, 'update');
  cache[store] = null;
  return obj;
}
async function deleteRecord(store, id){
  await dbDelete(store, id);
  await syncToCloud(store, {id}, 'delete');
  cache[store] = null;
}

};

function getFilteredRecords(storeKey){
  const cfg = MODULES[storeKey];
  const st = moduleState[storeKey] || {};
  let recs = [...(cache[storeKey]||[])];
  if(st.search){
    const q = st.search.toLowerCase();
    recs = recs.filter(r => cfg.fields.some(f => String(r[f.key]||"").toLowerCase().includes(q)));
  }
  if(st.from) recs = recs.filter(r => (r.date||"") >= st.from);
  if(st.to) recs = recs.filter(r => (r.date||"") <= st.to);
  recs.sort((a,b)=> (b.date||"").localeCompare(a.date||"") || (b._updatedAt - a._updatedAt));
  return recs;
}

  const cfg = MODULES[storeKey];
  const wrap = document.getElementById('modTableWrap');
  const recs = getFilteredRecords(storeKey);
  const fieldMap = {}; cfg.fields.forEach(f=> fieldMap[f.key]=f);
  if(recs.length===0){
    wrap.innerHTML = `<div class="empty-state"><div class="em-ic">📭</div>No ${cfg.title.toLowerCase()} found. Click "Add ${cfg.singular}" to create one.</div>`;
    return;

  let total = 0;
  const rows = recs.map(r=>{
    total += Number(r.amount||0);
    const cells = cfg.columns.map(colKey=>{
      const f = fieldMap[colKey];
      let val = r[colKey];
      if(colKey === cfg.dateField) return `<td class="mono">${fmtDate(val)}</td>`;
      if(colKey === "amount" || colKey==="commission" || colKey==="ratePerPage" || colKey==="ratePerCopy") return `<td class="mono">${fmtMoney(val)}</td>`;
      if(f && f.type==="select" && colKey==="status") return `<td><span class="tag ${statusTagClass(val)}">${escapeHtml(val||'—')}</span></td>`;
      return `<td>${escapeHtml(val ?? '—')}</td>`;
    }).join("");
    return `<tr>${cells}<td><div class="row-actions">
      <button class="icon-btn" title="Edit" onclick="openModuleForm('${storeKey}', '${r.id}')">✏️</button>
      <button class="icon-btn" title="Delete" onclick="deleteModuleRecord('${storeKey}', '${r.id}')">🗑️</button>

      if(f.type==="select"){
        return `<div class="field ${full}"><label>${f.label}${f.required?' *':''}</label>
          <select data-key="${f.key}">${f.options.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o}</option>`).join("")}</select></div>`;
      }
      if(f.type==="textarea"){
        return `<div class="field ${full}"><label>${f.label}</label><textarea data-key="${f.key}" rows="2">${escapeHtml(val)}</textarea></div>`;
      }
      return `<div class="field"><label>${f.label}${f.required?' *':''}</label>
        <input type="${f.type}" data-key="${f.key}" value="${escapeHtml(val)}" ${f.type==='number'?'step="0.01"':''}></div>`;
    }).join("")}
  </div>`;
  document.getElementById('modalSaveBtn').onclick = async ()=>{
    const inputs = body.querySelectorAll('[data-key]');
    const obj = editing ? {...record} : {};
    inputs.forEach(inp => {
      const f = cfg.fields.find(f=>f.key===inp.dataset.key);
      obj[inp.dataset.key] = f.type==="number" ? Number(inp.value||0) : inp.value;
    });
    cfg.fields.forEach(f=>{ if(f.computed) obj[f.key] = Number(f.computed(obj)); });
    const missing = cfg.fields.filter(f=>f.required && (obj[f.key]===undefined || obj[f.key]===""));
    if(missing.length){ showToast("Please fill: " + missing.map(f=>f.label).join(", "), "danger"); return; }
    if(editing){ await updateRecord(storeKey, obj); showToast(cfg.singular + " updated", "success"); }
    else{ await addRecord(storeKey, obj); showToast(cfg.singular + " added", "success"); }
    await refreshCache(storeKey);
    closeModal();
    if(currentPage===storeKey) renderModuleTable(storeKey);
  };
  document.getElementById('modalOverlay').classList.add('open');
};

window.closeModal = function(){ document.getElementById('modalOverlay').classList.remove('open'); };

window.exportModuleCSV = function(storeKey){
  const cfg = MODULES[storeKey];
  const recs = getFilteredRecords(storeKey);
  if(recs.length===0){ showToast("Nothing to export", "danger"); return; }
  const headers = cfg.fields.map(f=>f.label);
  const keys = cfg.fields.map(f=>f.key);
  let csv = headers.join(",") + "
";
  recs.forEach(r=>{ csv += keys.map(k=> `"${String(r[k]??'').replace(/"/g,'""')}"`).join(",") + "
"; });
  downloadFile(`${storeKey}_${today()}.csv`, csv, "text/csv");
};

window.downloadFile = function(filename, content, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
};

let lastReportRows = [];
window.runReport = function(){
  const from = document.getElementById('repFrom').value;
  const to = document.getElementById('repTo').value;
  const revenueStores = ["transactions","aeps","irctc","pan","certificates","printing","photocopy"];
  let rows = [];
  let categoryTotals = {};
  let grandTotal = 0;
  revenueStores.forEach(s=>{
    (cache[s]||[]).forEach(r=>{
      if((!from || r.date>=from) && (!to || r.date<=to)){
        categoryTotals[MODULES[s].title] = (categoryTotals[MODULES[s].title]||0) + Number(r.amount||0);
        grandTotal += Number(r.amount||0);
        rows.push({date:r.date, category:MODULES[s].title, customer:r.customerName||'', amount:r.amount||0});
      }
    });
  });
  let expenseTotal = 0;
  let expenseCategory = {};
  (cache.expenses||[]).forEach(e=>{
    if((!from || e.date>=from) && (!to || e.date<=to)){
      expenseTotal += Number(e.amount||0);
      expenseCategory[e.category] = (expenseCategory[e.category]||0) + Number(e.amount||0);
      rows.push({date:e.date, category:"Expense: "+e.category, customer:e.description||'', amount:-Number(e.amount||0)});
    }
  });
  lastReportRows = rows.sort((a,b)=> (a.date||"").localeCompare(b.date||""));
  const out = document.getElementById('reportOutput');
  out.innerHTML = `
    <div class="stat-grid" style="margin-top:16px;">
      <div class="stat-card success"><div class="label">Total Revenue</div><div class="value">${fmtMoney(grandTotal)}</div></div>
      <div class="stat-card danger"><div class="label">Total Expenses</div><div class="value">${fmtMoney(expenseTotal)}</div></div>
      <div class="stat-card accent"><div class="label">Net Profit</div><div class="value">${fmtMoney(grandTotal-expenseTotal)}</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Revenue by Category</div>
        <div class="kv-list">${Object.entries(categoryTotals).length? Object.entries(categoryTotals).map(([k,v])=>`<div><span>${k}</span><span class="mono">${fmtMoney(v)}</span></div>`).join("") : '<div class="empty-state" style="padding:16px;">No revenue in this range.</div>'}</div>
      </div>
      <div class="card">
        <div class="card-title">Expenses by Category</div>
        <div class="kv-list">${Object.entries(expenseCategory).length? Object.entries(expenseCategory).map(([k,v])=>`<div><span>${k}</span><span class="mono">${fmtMoney(v)}</span></div>`).join("") : '<div class="empty-state" style="padding:16px;">No expenses in this range.</div>'}</div>
      </div>
    </div>`;
};

window.exportReportCSV = function(){
  if(lastReportRows.length===0){ showToast("No data to export", "danger"); return; }
  let csv = "Date,Category,Customer/Note,Amount
";
  lastReportRows.forEach(r=> csv += `"${r.date}","${r.category}","${(r.customer||'').replace(/"/g,'""')}","${r.amount}"
`);
  downloadFile(`report_${today()}.csv`, csv, "text/csv");
};

        <div class="field"><label>Amount</label><input type="number" id="itemAmount" value="0" step="0.01" readonly style="background:var(--bg);"></div>
        <button class="btn btn-primary btn-sm" onclick="addInvoiceItem()" style="height:36px;">+ Add</button>
      </div>
    </div>
    <div style="margin-top:16px; text-align:right; font-family:'Sora',sans-serif; font-size:18px; font-weight:700;">
      Grand Total: <span id="invGrandTotal" style="color:var(--accent);">${fmtMoney(0)}</span>
    </div>`;
  const calcAmount = ()=>{
    const qty = Number(document.getElementById('itemQty').value||0);
    const rate = Number(document.getElementById('itemRate').value||0);
    document.getElementById('itemAmount').value = (qty * rate).toFixed(2);
  };
  document.getElementById('itemQty').oninput = calcAmount;
  document.getElementById('itemRate').oninput = calcAmount;
  document.getElementById('modalSaveBtn').onclick = async ()=>{
    const customer = document.getElementById('invCustomer').value.trim();
    if(!customer){ showToast("Customer name is required", "danger"); return; }
    if(invoiceItems.length===0){ showToast("Add at least one item", "danger"); return; }
    const subtotal = invoiceItems.reduce((s,i)=>s + (i.qty*i.rate), 0);
    const gstRate = 0;
    const gstAmount = subtotal * gstRate;
    const grandTotal = subtotal + gstAmount;
    const invoice = {
      id: generateId(),
      invoiceNumber: generateInvoiceNumber(),
      date: document.getElementById('invDate').value,
      customerName: customer,
      customerPhone: document.getElementById('invPhone').value,
      customerAddress: document.getElementById('invAddress').value,
      paymentMode: document.getElementById('invPayment').value,
      items: invoiceItems,
      subtotal: subtotal,
      gstRate: gstRate,
      gstAmount: gstAmount,
      grandTotal: grandTotal,
      status: "Unpaid",
      notes: ""
    };
    await addRecord('invoices', invoice);
    SETTINGS.invoiceNextNum = (SETTINGS.invoiceNextNum || 1) + 1;
    await dbPut('settings', SETTINGS);
    await syncToCloud('settings', SETTINGS, 'update');
    closeModal();
    showToast("Invoice created: " + invoice.invoiceNumber, "success");
    goTo('billing');
  };
  document.getElementById('modalOverlay').classList.add('open');
};

function generateInvoiceNumber(){
  const prefix = SETTINGS.invoicePrefix || "AK";
  const num = String(SETTINGS.invoiceNextNum || 1).padStart(4, '0');
  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  return `${prefix}-${date}-${num}`;
}
window.generateInvoiceNumber = generateInvoiceNumber;

window.addInvoiceItem = function(){
  const name = document.getElementById('itemName').value.trim();
  const qty = Number(document.getElementById('itemQty').value||0);
  const rate = Number(document.getElementById('itemRate').value||0);
  const amount = qty * rate;
  if(!name || qty <= 0 || rate <= 0){ showToast("Enter valid item details", "danger"); return; }
  invoiceItems.push({name, qty, rate, amount});
  renderInvoiceItems();
  document.getElementById('itemName').value = '';
  document.getElementById('itemQty').value = '1';
  document.getElementById('itemRate').value = '0';
  document.getElementById('itemAmount').value = '0';
};

function renderInvoiceItems(){
  const list = document.getElementById('invItemsList');
  const total = invoiceItems.reduce((s,i)=>s+i.amount, 0);
  document.getElementById('invGrandTotal').textContent = fmtMoney(total);
  if(invoiceItems.length===0){ list.innerHTML = '<div class="hint">No items added yet.</div>'; return; }
  list.innerHTML = `<table style="font-size:12px;"><thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th><th></th></tr></thead>
    <tbody>${invoiceItems.map((item,idx)=>`
      <tr><td>${escapeHtml(item.name)}</td><td>${item.qty}</td><td class="mono">${fmtMoney(item.rate)}</td>
      <td class="mono">${fmtMoney(item.amount)}</td>
      <td><button class="icon-btn" style="width:22px;height:22px;" onclick="removeInvoiceItem(${idx})">✕</button></td></tr>
    `).join("")}</tbody></table>`;
}
window.renderInvoiceItems = renderInvoiceItems;

window.removeInvoiceItem = function(idx){
  invoiceItems.splice(idx, 1);
  renderInvoiceItems();
};

window.downloadInvoicePDF = function(){
  if(!currentInvoice){ showToast("No invoice loaded", "danger"); return; }
  const inv = currentInvoice;
  const jsPDF = window.jspdf.jsPDF;
  const doc = new jsPDF({unit:'mm', format:'a4'});
  doc.setFontSize(18); doc.setTextColor(28,37,48);
  doc.text(SETTINGS.shopName, 105, 20, {align:'center'});
  doc.setFontSize(9); doc.setTextColor(107,116,128);
  if(SETTINGS.address) doc.text(SETTINGS.address, 105, 26, {align:'center'});
  doc.text(`Phone: ${SETTINGS.phone||'—'} | GST: ${SETTINGS.gstNo||'—'}`, 105, 31, {align:'center'});
  doc.setDrawColor(217,142,43); doc.setLineWidth(0.5);
  doc.line(15, 35, 195, 35);
  doc.setFontSize(10); doc.setTextColor(28,37,48);
  doc.text(`Invoice #: ${inv.invoiceNumber}`, 15, 43);
  doc.text(`Date: ${fmtDate(inv.date)}`, 15, 48);
  doc.text(`Customer: ${inv.customerName}`, 15, 53);
  doc.text(`Payment: ${inv.paymentMode}`, 15, 58);
  const tableData = inv.items.map((item,idx)=>[idx+1, item.name, item.qty, fmtMoney(item.rate), fmtMoney(item.amount)]);
  doc.autoTable({
    startY: 65,
    head: [['#', 'Item', 'Qty', 'Rate', 'Amount']],
    body: tableData,
    theme: 'grid',
    headStyles: {fillColor: [246,244,239], textColor: [107,116,128], fontSize: 9},
    bodyStyles: {fontSize: 10, textColor: [28,37,48]},
    columnStyles: {0:{cellWidth:15}, 2:{halign:'right'}, 3:{halign:'right'}, 4:{halign:'right'}},
    styles: {font: 'helvetica', lineColor: [229,224,211], lineWidth: 0.2}
  });
  const finalY = doc.lastAutoTable.finalY || 100;
  doc.setFontSize(10);
  doc.text(`Subtotal: ${fmtMoney(inv.subtotal)}`, 195, finalY + 10, {align:'right'});
  if(inv.gstRate > 0){
    doc.text(`GST (${(inv.gstRate*100).toFixed(0)}%): ${fmtMoney(inv.gstAmount)}`, 195, finalY + 16, {align:'right'});
  }
  doc.setFontSize(14); doc.setFont('helvetica', 'bold');
  doc.text(`Grand Total: ${fmtMoney(inv.grandTotal)}`, 195, finalY + 24, {align:'right'});
  doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(107,116,128);
  doc.text('Thank you for your business!', 105, finalY + 40, {align:'center'});
  doc.save(`${inv.invoiceNumber}.pdf`);
  showToast("PDF downloaded", "success");
};

window.exportBackup = async function(){
  const dump = {};
  for(const store of STORES){ dump[store] = await dbGetAll(store); }
  dump._meta = {exportedAt: new Date().toISOString(), app:"AK Digital Services", version:2};
  downloadFile(`AK_Digital_Services_Backup_${today()}.json`, JSON.stringify(dump, null, 2), "application/json");
  showToast("Backup downloaded", "success");
};

window.restoreBackup = async function(){
  const fileInput = document.getElementById('restoreFile');
  if(!fileInput.files.length){ showToast("Choose a backup file first", "danger"); return; }
  if(!confirm("This will replace ALL current data. Continue?")) return;
  const file = fileInput.files[0];
  const text = await file.text();
  let data;
  try{ data = JSON.parse(text); } catch(e){ showToast("Invalid backup file", "danger"); return; }
  for(const store of STORES){
    if(!data[store]) continue;
    await dbClear(store);
    for(const rec of data[store]){ await dbPut(store, rec); }
  }
  await loadSettings();
  cache = {};
  showToast("Backup restored successfully", "success");
  goTo('dashboard');
};

window.clearAllData = async function(){
  if(!confirm("This will permanently delete ALL records (customers, transactions, inventory, everything except settings). Continue?")) return;
  if(!confirm("Are you absolutely sure? This cannot be undone.")) return;
  for(const store of STORES){ if(store!=='settings') await dbClear(store); }
  cache = {};
  showToast("All data cleared", "danger");
  goTo('dashboard');
};

};

document.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && document.getElementById('lockScreen').style.display==='flex') tryUnlock();
});

/* ---------------- INIT ---------------- */
async function loadSettings(){
  const s = await dbGet('settings', 1);
  if(s) SETTINGS = {...SETTINGS, ...s};
  else await dbPut('settings', SETTINGS);
  if(SETTINGS.firebaseConfig && SETTINGS.firebaseConfig.apiKey && SETTINGS.firebaseConfig.apiKey !== 'YOUR_API_KEY'){
    setTimeout(()=> initFirebase(SETTINGS.firebaseConfig), 500);
  }
}

function updateTopDate(){
  document.getElementById('topDate').textContent = new Date().toLocaleString('en-IN', {dateStyle:'medium', timeStyle:'short'});
}

async function init(){
  await openDB();
  await loadSettings();
  renderNav();
  updateTopDate();
  setInterval(updateTopDate, 30000);
  goTo('dashboard');
}
init();
</script>
</body>
</html>
